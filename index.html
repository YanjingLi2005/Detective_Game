你没能进入面试室就被带走了。`,
            choices: [{ text: "↩ 回溯", next: "kill_pillow_charger" }]
        },

        interrogate_knee_success: {
            img: "审讯室 结束",
            text: `“骑车摔的？”陈警官盯着你的膝盖看了几秒，“你膝盖上的伤，花坛里刚好有一个对应的脚印。巧合太多了。”

            choices: [{ text: "进入第二章（开发中）", next: "prologue" }]
        },

        interrogate_knee_fail: {
            img: "手铐",
            text: `你的沉默让陈警官更加怀疑。他站起身：“周诚，我们请你回局里协助调查。”

你被带走了。`,
            choices: [{ text: "↩ 重新尝试", next: "plan_phone_gamble" }]
        }
    };

    function renderScene(sceneKey) {
        globalState.currentScene = sceneKey;
        const scene = gameScript[sceneKey];
        if (!scene) {
            document.getElementById('story-viewport').innerHTML = '场景加载失败，请刷新。';
            return;
        }

        document.getElementById('image-slot').textContent = `[ 画面特写：${scene.img || "无"} ]`;
        document.getElementById('story-viewport').innerHTML = scene.text;

        const panel = document.getElementById('choices-panel');
        panel.innerHTML = '';

        if (scene.choices && scene.choices.length > 0) {
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'action-choice-btn';
                btn.innerHTML = choice.text;
                btn.onclick = () => renderScene(choice.next);
                panel.appendChild(btn);
            });
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderScene("prologue");
</script>
</body>
</html>
