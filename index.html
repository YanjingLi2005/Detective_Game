    function renderScene(sceneKey) {
        globalState.currentScene = sceneKey;
        const scene = gameScript[sceneKey];
        if (!scene) {
            document.getElementById('story-viewport').innerHTML = '场景加载失败，请刷新页面。';
            return;
        }

        const imgSlot = document.getElementById('image-slot');
        imgSlot.textContent = `[ 画面特写：${scene.img || "无"} ]`;

        const storyViewport = document.getElementById('story-viewport');
        storyViewport.innerHTML = scene.text;

        const choicesPanel = document.getElementById('choices-panel');
        choicesPanel.innerHTML = '';

        if (scene.choices && scene.choices.length > 0) {
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'action-choice-btn';
                btn.innerHTML = choice.text;
                btn.onclick = () => renderScene(choice.next);
                choicesPanel.appendChild(btn);
            });
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderScene("prologue");
